#DB url and DB name
spring.datasource.url=jdbc:mysql://localhost:3306/pmsdb-prod?useSSL=false&serverTimezone=UTC&useLegacyDatetimeCode=false

#DB username
spring.datasource.username=root

#DB password
spring.datasource.password=

#DB driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Tells Hibernate to keep existing data and table while server restart,
#other value is create where after server restart everything is recreated
spring.jpa.hibernate.ddl-auto=update

#This enables printing of SQL queries generated by Hibernate in console
spring.jpa.show-sql=true

#Hibernate properties
#The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect